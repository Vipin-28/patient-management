# ===============================
# APP CONFIG
# ===============================
spring.application.name=patient-service
server.port=4001
server.address=0.0.0.0

# ===============================
# DATABASE (Azure PostgreSQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional (recommended)
spring.jpa.open-in-view=false

# ===============================
# GRPC CLIENT (Billing Service)
# ===============================
billing.service.address=${BILLING_SERVICE_ADDRESS:billing-service}
billing.service.grpc.port=${BILLING_SERVICE_GRPC_PORT:9011}

# ===============================
# GRPC SERVER (optional if exposed)
# ===============================
grpc.server.port=9090

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.pm=DEBUG

# ===============================
# OPTIONAL (SAFE DEFAULT)
# ===============================
ai.openai.api.key=${AI_OPENAI_API_KEY:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
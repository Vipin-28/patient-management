server:
  port: 4004

spring:
  cloud:
    gateway:
      routes:

        # ✅ AUTH SERVICE (FIXED)
        - id: auth-service-route
          uri: http://auth-service
          predicates:
            - Path=/auth/**
          filters:
            # Remove /auth prefix → forward correctly to /login
            - RewritePath=/auth/(?<segment>.*), /${segment}

        # ✅ PATIENT SERVICE (FIXED)
        - id: patient-service-route
          uri: http://patient-service
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        # ✅ PATIENT DOCS
        - id: api-docs-patient-route
          uri: http://patient-service
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients,/v3/api-docs

        # ✅ AUTH DOCS
        - id: api-docs-auth-route
          uri: http://auth-service
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth,/v3/api-docs


# ✅ ENV VARIABLE USED BY FILTER
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth-service}